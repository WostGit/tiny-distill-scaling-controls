name: tiny-distill-scaling-study

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:

jobs:
  run-study:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tiny scaling study
        run: |
          python scripts/run_scaling_curve.py --output-root outputs/metrics

      - name: Upload metrics artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tiny-distill-metrics
          path: |
            outputs/metrics/summary_metrics.json
            outputs/metrics/condition_table.json
            outputs/metrics/condition_table.md
            outputs/metrics/contamination_audit.json
            outputs/metrics/*/train_metrics.json
            outputs/metrics/*/eval_metrics.json
